<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MediFlow banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E1014"/>
      <stop offset="100%" stop-color="#16232B"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4C8DFF"/>
      <stop offset="100%" stop-color="#3DDC91"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>

  <!-- decorative network motif, echoing the live Vanta.NET background -->
  <g stroke="#4C8DFF" stroke-width="1" opacity="0.22">
    <line x1="780" y1="40" x2="860" y2="90"/>
    <line x1="860" y1="90" x2="940" y2="55"/>
    <line x1="860" y1="90" x2="900" y2="150"/>
    <line x1="940" y1="55" x2="1030" y2="95"/>
    <line x1="900" y1="150" x2="1000" y2="170"/>
    <line x1="1000" y1="170" x2="1030" y2="95"/>
    <line x1="1030" y1="95" x2="1110" y2="60"/>
    <line x1="1000" y1="170" x2="1090" y2="200"/>
  </g>
  <g fill="#3DDC91" opacity="0.6">
    <circle cx="780" cy="40" r="3"/>
    <circle cx="860" cy="90" r="3.5"/>
    <circle cx="940" cy="55" r="3"/>
    <circle cx="900" cy="150" r="3"/>
    <circle cx="1030" cy="95" r="3.5"/>
    <circle cx="1000" cy="170" r="3"/>
    <circle cx="1110" cy="60" r="3"/>
    <circle cx="1090" cy="200" r="3"/>
  </g>

  <!-- logo mark -->
  <rect x="70" y="86" width="80" height="80" rx="20" fill="url(#mark)"/>
  <path d="M92 126h13l6-21 12 42 9-27 6 12h10" fill="none" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- wordmark -->
  <text x="172" y="128" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="#F3F2F0">MediFlow</text>
  <text x="174" y="160" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" fill="#A9B4BC">A clinical documentation assistant built on trust</text>

  <!-- status pill -->
  <rect x="950" y="200" width="180" height="30" rx="15" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.15"/>
  <text x="1040" y="220" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" letter-spacing="1" fill="#A9B4BC">UX CASE STUDY · 2026</text>
</svg>
